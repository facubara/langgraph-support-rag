# Render blueprint for the FastAPI backend (the frontend deploys separately to Vercel).
# Create from the Render dashboard → "New +" → "Blueprint" pointing at this repo.
services:
  - type: web
    name: support-copilot-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter            # the persistent disk below needs a paid instance; on `free` the
    healthCheckPath: /health #   container runs but SQLite resets on every redeploy.
    autoDeploy: true
    envVars:
      - key: SQLITE_PATH
        value: /data/app.sqlite
      - key: LLM_PROVIDER
        value: mock          # set to "gemini" + add GOOGLE_API_KEY for real model calls
      - key: AUTH_REQUIRED
        value: "true"
      # Must match the frontend's SERVICE_SHARED_SECRET (set the SAME value on Vercel).
      - key: SERVICE_SHARED_SECRET
        sync: false
      - key: OWNER_EMAIL
        sync: false          # your email — unlocks /admin (sign-ins, users)
      - key: CORS_ALLOW_ORIGINS
        sync: false          # https://<your-app>.vercel.app
      - key: CORS_ALLOW_ORIGIN_REGEX
        sync: false          # optional: https://.*-<project>\.vercel\.app for preview URLs
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
